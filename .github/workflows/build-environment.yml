name: Build docker image
description: "Builds the Docker image on the given tag and also updates the 'latest-YYYY-YY' cohort tag for the Docker image."

on:
  workflow_call:
    inputs:
      tag:
        description: "The tag to checkout and build from."
        required: true
        type: string
      cohort:
        description: "Cohort tag (e.g. 2025-26) to update the 'latest-YYYY-YY' cohort tag for the Docker image. Optional."
        required: false
        type: string
  workflow_dispatch:
    inputs:
      commit:
        description: "The commit-like to checkout and build Docker image from."
        required: true
        type: string
      tag:
        description: "The tag for the artifact."
        required: true
        type: string
      cohort:
        description: "Cohort tag (e.g. 2025-26) to update the 'latest-YYYY-YY' cohort tag for the Docker image. Optional."
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/environment

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ case(github.event_name == 'workflow_call', inputs.tag, inputs.commit) }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup env
        run: |
          echo "IMAGE_LC=${IMAGE,,}" >>${GITHUB_ENV}
          if [ -z ${{ inputs.cohort }} ]; then
            YEAR=$(echo "year=$(date +%Y); month=$(date +%m); if (month <= 10) year-1 else year" | bc)
            SHORT_NEXT=$(echo ${YEAR:2}+1 | bc)
            echo "COHORT=${YEAR}-${SHORT_NEXT}" >>${GITHUB_ENV}
          else
            echo "COHORT=${{ inputs.cohort }}" >>${GITHUB_ENV}
          fi
        env:
          IMAGE: '${{ env.IMAGE }}'

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ARTIFACT_TAG=${{ inputs.tag }}
          tags: |
            ${{ env.IMAGE_LC }}:${{ inputs.tag }}
            ${{ env.IMAGE_LC }}:latest
            ${{ format('{0}:latest-{1}', env.IMAGE_LC, env.COHORT) }}
